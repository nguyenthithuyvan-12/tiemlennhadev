<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAFAF8"/>

  <!-- Top mint accent bar -->
  <rect width="1200" height="8" fill="#CAE5E6"/>

  <!-- Left decorative block -->
  <rect x="0" y="0" width="400" height="630" fill="#CAE5E6" opacity="0.25"/>

  <!-- Brand name -->
  <text
    x="600" y="260"
    font-family="Georgia, serif"
    font-size="64"
    font-weight="500"
    fill="#2C2C2C"
    text-anchor="middle"
  >Tiem Len Nha Dev</text>

  <!-- Tagline -->
  <text
    x="600" y="330"
    font-family="Georgia, serif"
    font-size="28"
    font-style="italic"
    fill="#8A9BA8"
    text-anchor="middle"
  >Handmade voi tinh yeu</text>

  <!-- Bottom label -->
  <text
    x="600" y="530"
    font-family="Arial, sans-serif"
    font-size="16"
    fill="#8A9BA8"
    text-anchor="middle"
    letter-spacing="4"
  >HANDMADE · LEN TU NHIEN · VIET NAM</text>

  <!-- Decorative circle -->
  <circle cx="1100" cy="100" r="120" fill="#CAE5E6" opacity="0.3"/>
  <circle cx="120" cy="550" r="80" fill="#E8D5C4" opacity="0.4"/>
</svg>
